---

- name: Get Caddy gpg key
  ansible.builtin.uri:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    return_content: true
  register: caddy_gpg

- name: Add Caddy Repo
  deb822_repository:
    name: caddy
    types: deb
    uris: https://dl.cloudsmith.io/public/caddy/stable/deb/debian
    suites: any-version
    components:
      - main
    signed_by: "{{ caddy_gpg.content }}"

- name: Install Go and Caddy
  ansible.builtin.apt:
    update_cache: true
    name:
      - golang-go
      - caddy

- name: Build Caddy with the Metaname extension
  ansible.builtin.command:
    argv:
      - caddyx
      - xcaddy build --with github.com/caddy-dns/metaname

- name: Configure Caddy
  ansible.builtin.template:
    dest: /etc/caddy/Caddyfile
    src: templates/Caddyfile.jinja
  notify: Caddy Reload