- name: Install Docker, Immich, Restic, Certbot and Caddy
  hosts: localhost
  become: true
  vars_files:
    - secret_vars.yml
  tasks:
    - name: Get Docker GPG key
      ansible.builtin.uri:
        url: https://download.docker.com/linux/ubuntu/gpg
        return_content: true
      register: docker_gpg

    - name: Add Docker Repo
      deb822_repository:
        name: docker
        types: deb
        uris: https://download.docker.com/linux/ubuntu
        suites: resolute
        components:
          - stable
        signed_by: "{{ docker_gpg.content }}"

    - name: Get caddy gpg key
      ansible.builtin.uri:
        url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
        return_content: true
      register: caddy_gpg

    - name: Add Caddy Repo
      deb822_repository:
        name: caddy
        types: deb
        uris: https://dl.cloudsmith.io/public/caddy/stable/deb/debian
        suites: any-version
        components:
          - main
        signed_by: "{{ caddy_gpg.content }}"

    - name: Install packages
      ansible.builtin.apt:
        update_cache: true
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
          - restic
          - python3
          - python3-dev
          - python3-venv
          - libaugeas-dev
          - gcc
          - caddy

    - name: Write the docker compose
      ansible.builtin.get_url:
        url: https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml
        dest: /opt/immich/docker-compose.yml
    
    - name: Write the docker env file
      ansible.builtin.template:
        dest: /opt/immich/.env
        src: templates/immich_env.jinja

    - name: Create cron variables for Restic
      ansible.builtin.cron:
        name: "{{item.name}}"
        env: true
        value: "{{item.value}}"
        cron_file: restic
        user: ubuntu
      loop:
        - name: MAILTO
          value: adrian.r.jarvis+immich@gmail.com
        - name: OS_AUTH_URL
          value: https://api.nz-por-1.catalystcloud.io:5000/v3
        - name: OS_APPLICATION_CREDENTIAL_ID
          value: "{{app_cred_id}}"
        - name: OS_APPLICATION_CREDENTIAL_SECRET
          value: "{{app_cred_secret}}"
        - name: RESTIC_PASSWORD
          value: "{{restic_password}}"
        - name: RESTIC_REPOSITORY
          value: "swift:immich_backup"
        - name: SWIFT_DEFAULT_CONTAINER_POLICY
          value: nz-por-1--o2--sr-standard
      loop_control:
        label: "{{ item.name }}"

    - name: Create cron entries for Restic
      ansible.builtin.cron:
        name: restic backup
        special_time: daily
        job: "restic backup {{item}} >> /var/log/immich_backup.log"
        cron_file: restic
      loop:
        - /opt/immich/library
        - /opt/immich/object
        - /opt/immich/profile

    - name: Create log rotate config for restic
      ansible.builtin.copy:
        dest: /etc/logrotate.d/restic
        content: |
          /var/log/immich_backup.log {
            missingok
            rotate 7
            compress
          }

    - name: Create virtual env for certbot
      ansible.builtin.pip:
        virtualenv: /opt/certbot
        name:
          - certbot
          - git+https://github.com/metaname/certbot-dns-metaname.git

    - name: Create certbot conf file
      ansible.builtin.template:
        dest: /etc/metaname.ini
        src: templates/metaname.ini.jinja
        owner: ubuntu
        group: ubuntu
        mode: '0600'

    - name: Create a certificate
      ansible.builtin.command:
        argv:
          - /opt/certbot/bin/cerbot
          - --metaname-dns-credentials
          - /etc/metaname.ini
          - certonly
          - --authenticator 
          - dns-metaname 
          - -d 
          - photos.jarvis.kiwi.nz

    - name: Start the immich container
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - -f
          - /opt/immich/docker-compose.yml
          - up
          - -d
